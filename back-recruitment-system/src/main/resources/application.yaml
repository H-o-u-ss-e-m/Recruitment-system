spring:
  application:
    name: recruitment-system

  # Configuration de la base de données PostgreSQL
  datasource:
    url: jdbc:postgresql://localhost:5432/recruitment-system
    username: postgres
    password: system
    driver-class-name: org.postgresql.Driver

  # Configuration JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: update # Crée/Met à jour les tables automatiquement selon tes classes @Entity
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Configuration pour l'envoi d'emails (Notifications de statut)
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:rezguihoussem67@gmail.com}
    password: ${MAIL_PASSWORD:zxtl lprq wsdw awov}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  # Configuration pour l'upload des fichiers PDF (CV et Lettre de Motivation)
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

# Configuration personnalisée pour le nom de l'expéditeur
app:
  mail:
    from: ${MAIL_FROM:Recruitment System <rezguihoussem67@gmail.com>}

# Port du serveur
server:
  port: 8080
  servlet:
    session:
      timeout: 30m
      cookie:
        http-only: true
        secure: ${SESSION_COOKIE_SECURE:false}
        same-site: lax